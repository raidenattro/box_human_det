services:
  # 轻量 UI：须先在宿主机 npm run build，再 docker 打包。推荐: ./scripts/build-ui-image.sh --up
  visual-dps-ui:
    profiles: ["ui"]
    build:
      context: .
      dockerfile: Dockerfile.ui
    container_name: visual-dps-ui
    ports:
      - "8045:8045"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      - JSON_DIR=/app/localdata/json
      - LAST_FRAME=/app/localdata/last_frame.jpg
      - CAMERA_IPS_FILE=/app/localdata/camera_ips.json
      - FRAMES_DIR=/app/localdata/frames
      - CAPTURE_HEIGHT=480
      - RTSP_HOST_REWRITE=host.docker.internal
      - FRONTEND_DIST=/app/web/dist
      - MEDIAMTX_CONFIG_PATH=/app/localdata/mediamtx.yml
      - MEDIAMTX_API_URL=http://host.docker.internal:9997
      - MEDIAMTX_PUBLIC_HOST=127.0.0.1
      - MEDIAMTX_HLS_PORT=8888
      - MEDIAMTX_WEBRTC_PORT=8889
      - MEDIAMTX_HLS_BASE=http://host.docker.internal:8888
      - MEDIAMTX_WEBRTC_BASE=http://host.docker.internal:8889
      - HOST_PROJECT_ROOT=${PWD}
      - INFERENCE_IMAGE=${INFERENCE_IMAGE:-visual-dps-inference-lite:latest}
      - INFERENCE_LITE_IMAGE=visual-dps-inference-lite:latest
      - INFERENCE_BACKEND=${INFERENCE_BACKEND:-mediapipe}
      - INFERENCE_JSON_PATH=localdata/json/precise_boxes_new.json
      - INFERENCE_STATUS_DIR=/app/localdata/inference
      - LOG_DB_PATH=/app/localdata/logs/visual_dps.db
    volumes:
      - ./app_config.json:/app/app_config.json:ro
      - ./localdata:/app/localdata
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

  # 推理 Worker 镜像（由 Dashboard API 按需 docker run 启动，勿手动 up）
  visual-dps-inference:
    profiles: ["inference"]
    build:
      context: .
      dockerfile: Dockerfile
    image: visual-dps-inference:latest
    command: ["python", "inference_worker.py"]

  # 轻量推理 Worker（MediaPipe，本地测试平替；UI 设 INFERENCE_IMAGE=visual-dps-inference-lite:latest）
  visual-dps-inference-lite:
    profiles: ["inference-lite"]
    build:
      context: .
      dockerfile: Dockerfile.inference-lite
    image: visual-dps-inference-lite:latest
    command: ["python", "inference_worker.py"]

  # 完整服务（含 AI 模型）。用法: docker compose --profile full up -d
  visual-dps:
    profiles: ["full"]
    build:
      context: .
      dockerfile: Dockerfile
    container_name: visual-dps
    restart: unless-stopped
    ports:
      - "8045:8045"
    environment:
      - TZ=Asia/Shanghai
    gpus: all
    volumes:
      - ./app_config.json:/app/app_config.json:ro
      - ./localdata:/app/localdata
