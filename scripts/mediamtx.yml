# WSL 本地摄像头 RTSP 推流（MediaMTX + ffmpeg）
# 用法: scripts/start-webcam-rtsp.sh

logLevel: info
api: yes
apiAddress: 127.0.0.1:9997
rtspAddress: :8554
rtmpAddress: ""
hlsAddress: :8888
webrtcAddress: :8889
webrtcAllowOrigin: '*'
srtAddress: ""

paths:
  cam:
    source: publisher
    runOnInit: >
      ffmpeg -hide_banner -loglevel warning
      -f v4l2 -input_format mjpeg -video_size 640x480 -framerate 15
      -i /dev/video0
      -c:v libx264 -pix_fmt yuv420p -preset ultrafast -tune zerolatency
      -b:v 800k -maxrate 800k -bufsize 1600k
      -g 15 -f rtsp -rtsp_transport tcp
      rtsp://127.0.0.1:$RTSP_PORT/$MTX_PATH
    runOnInitRestart: yes

  # 第二路：由 scripts/start-mp4-rtsp.sh 从 MP4 循环推流
  cam2:
    source: publisher
