<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>AI 监控</title>
    <style>
        body { background: #121212; color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; text-align: center; margin: 0; padding: 20px;}
        .panel { background: #1e1e1e; padding: 15px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.5);}
        button { background: #00ffcc; color: #000; border: none; padding: 10px 20px; font-weight: bold; border-radius: 4px; cursor: pointer; margin: 0 10px; transition: 0.2s;}
        button:hover { background: #00ccaa; transform: scale(1.02); }
        canvas { border: 2px solid #333; border-radius: 6px; margin: 5px; box-shadow: 0 4px 8px rgba(0,0,0,0.3);}
        
        /* 视图布局 */
        #views-container { display: flex; justify-content: center; align-items: flex-start; gap: 15px; display: none; margin-top: 10px;}
        .col-left { display: flex; flex-direction: column; gap: 15px;}
        
        /* 动态状态引导栏样式 */
        .status-banner {
            background: #2b3a42;
            border-left: 6px solid #f39c12; 
            padding: 15px 25px;
            margin: 0 auto 20px auto;
            max-width: 800px;
            text-align: left;
            border-radius: 6px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }
        .status-title { font-weight: bold; color: #f39c12; font-size: 1.2em; margin-bottom: 8px; transition: color 0.3s;}
        .status-desc { color: #dcdde1; font-size: 0.95em; line-height: 1.5;}

        /* HUD 性能监控仪表盘样式 */
        .hud-panel {
            background: rgba(0, 0, 0, 0.85);
            border: 1px solid #333;
            border-left: 5px solid #e74c3c;
            color: #fff;
            padding: 10px 20px;
            margin: 0 auto 15px auto;
            max-width: 1140px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-radius: 4px;
            font-family: monospace;
            font-size: 1.1em;
            display: none; /* 默认隐藏，推理时显示 */
        }
        .hud-item { margin-right: 20px; }
        .hud-value { color: #00ffcc; font-weight: bold; font-size: 1.2em; }
        .hud-danger { color: #ff4757; font-weight: bold; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mathjs/11.8.0/math.js"></script>
</head>
<body>

    <h2>📦 AI 货架监控系统</h2>
    
    <div id="statusBanner" class="status-banner">
        <div class="status-title" id="statusTitle">🟡 步骤 1：准备就绪</div>
        <div class="status-desc" id="statusDesc">请点击“上传并前端标注”完成网格后，先保存标注 JSON；如需测试可替换 JSON，再手动启动推理。</div>
    </div>

    <div class="panel">
        <input type="file" id="videoFile" accept="video/mp4" />
        <button onclick="uploadAndStartAnnotating()">1. 上传并前端标注</button>
        <button onclick="saveAnnotationOnly()" style="background: #f39c12; color:white;">2. 保存标注 JSON</button>
        <button onclick="startInferenceOnly()" style="background: #ff4757; color:white;">3. 启动 AI 推理</button>
    </div>

    <canvas id="annotatorCanvas" style="display:none; cursor:crosshair;"></canvas>

    <div id="hudPanel" class="hud-panel">
        <div>
            <span class="hud-item">⏱ 视频时间: <span id="hudTime" class="hud-value">00:00.000</span></span>
            <span class="hud-item">🎞 帧序号: <span id="hudFrame" class="hud-value">0</span></span>
        </div>
        <div>
            <span class="hud-item">🚀 后端处理帧率: <span id="hudFps" class="hud-value">0.0</span> FPS</span>
            <span class="hud-item">🟡 实时碰撞: <span id="hudHit" class="hud-value">0</span></span>
            <span class="hud-item">🔴 报警触发: <span id="hudAlarm" class="hud-value">0</span></span>
        </div>
    </div>

    <div id="views-container">
        <div class="col-left">
            <canvas id="cvsRaw" width="640" height="360"></canvas>
            <canvas id="cvsSkel" width="640" height="360"></canvas>
        </div>
        <div>
            <canvas id="cvsGrid" width="500" height="735"></canvas>
        </div>
    </div>

<script>
// ========================================================
// 🌟 UI 更新辅助函数
// ========================================================
function setUIStatus(title, desc, color) {
    const banner = document.getElementById("statusBanner");
    const titleEl = document.getElementById("statusTitle");
    const descEl = document.getElementById("statusDesc");
    
    titleEl.innerText = title;
    titleEl.style.color = color;
    descEl.innerText = desc;
    banner.style.borderLeftColor = color;
}

// ========================================================
// 🛠️ 核心数学库：前端计算单应性矩阵
// ========================================================
function getPerspectiveTransform(src, dst) {
    let A = []; let B = [];
    for (let i = 0; i < 4; i++) {
        A.push([src[i][0], src[i][1], 1, 0, 0, 0, -src[i][0]*dst[i][0], -src[i][1]*dst[i][0]]);
        A.push([0, 0, 0, src[i][0], src[i][1], 1, -src[i][0]*dst[i][1], -src[i][1]*dst[i][1]]);
        B.push(dst[i][0]); B.push(dst[i][1]);
    }
    let h = math.lusolve(A, B).map(x => x[0]);
    h.push(1.0);
    return [[h[0], h[1], h[2]], [h[3], h[4], h[5]], [h[6], h[7], h[8]]];
}

function perspectiveTransform(pt, M) {
    let z = M[2][0]*pt[0] + M[2][1]*pt[1] + M[2][2];
    let x = (M[0][0]*pt[0] + M[0][1]*pt[1] + M[0][2]) / z;
    let y = (M[1][0]*pt[0] + M[1][1]*pt[1] + M[1][2]) / z;
    return [x, y];
}

// ========================================================
// 🖌️ 第一阶段：纯前端网格标注逻辑
// ========================================================
const annCvs = document.getElementById('annotatorCanvas');
const annCtx = annCvs.getContext('2d');

let bgImage = new Image();
let shelfPoints = [];
let M_fwd = null, M_inv = null;
const MAP_W = 600, MAP_H = 600;
let gridRows = 4, gridCols = 4;
let layerYs = [], layerColXs = [];

let dragTarget = null, dragStartFlat = null, dragStartState = null;

async function uploadAndStartAnnotating() {
    const file = document.getElementById('videoFile').files[0];
    if(!file) return alert("请先选择视频文件！");

    resetAnnotationSession();
    
    setUIStatus("⏳ 正在处理", "正在上传视频并提取第一帧，请稍候...", "#f39c12");
    
    let fd = new FormData(); fd.append("file", file);
    await fetch('/api/upload_video', {method: 'POST', body: fd});
    
    let res = await fetch('/api/get_first_frame');
    let data = await res.json();
    
    if(data.error) return alert("提取视频帧失败！");
    
    bgImage.src = "data:image/jpeg;base64," + data.image;
    bgImage.onload = () => {
        annCtx.clearRect(0, 0, annCvs.width, annCvs.height);
        annCvs.width = bgImage.width;
        annCvs.height = bgImage.height;
        annCvs.style.display = "inline-block";
        document.getElementById('views-container').style.display = "none";
        document.getElementById('hudPanel').style.display = "none"; // 确保 HUD 隐藏
        
        setUIStatus("🔵 步骤 2：标定货架外框", "请在下方的视频画面中，依次点击 4 个点（左上、右上、右下、左下），框选出整个货架的外侧边界。", "#3498db");
        renderAnnotator();
    }
}

function initGrid() {
    for(let i=0; i<=gridRows; i++) layerYs.push(i * (MAP_H/gridRows));
    for(let i=0; i<gridRows; i++) {
        let cols = [];
        for(let j=0; j<=gridCols; j++) cols.push(j * (MAP_W/gridCols));
        layerColXs.push(cols);
    }
}

function getDist(p, a, b) {
    let l2 = (a[0]-b[0])**2 + (a[1]-b[1])**2;
    if (l2 === 0) return Math.hypot(p[0]-a[0], p[1]-a[1]);
    let t = Math.max(0, Math.min(1, ((p[0]-a[0])*(b[0]-a[0]) + (p[1]-a[1])*(b[1]-a[1])) / l2));
    return Math.hypot(p[0] - (a[0] + t*(b[0]-a[0])), p[1] - (a[1] + t*(b[1]-a[1])));
}

annCvs.onmousedown = (e) => {
    let rect = annCvs.getBoundingClientRect();
    let scaleX = annCvs.width / rect.width;
    let scaleY = annCvs.height / rect.height;
    let x = (e.clientX - rect.left) * scaleX;
    let y = (e.clientY - rect.top) * scaleY;
    
    if (shelfPoints.length < 4) {
        shelfPoints.push([x, y]);
        if (shelfPoints.length === 4) {
            let dst = [[0,0], [MAP_W,0], [MAP_W,MAP_H], [0,MAP_H]];
            M_fwd = getPerspectiveTransform(shelfPoints, dst);
            M_inv = getPerspectiveTransform(dst, shelfPoints);
            initGrid();
            
            setUIStatus("🟢 步骤 3：独立微调网格线", "网格已自动贴合！请将鼠标移至横向或纵向线条上，按住鼠标【左键】拖拽，使线条完美对齐视频中的料箱边界。调整完成后先保存 JSON，再启动推理。", "#2ecc71");
        }
    } else {
        // 横线检测 (整行)
        for(let i=1; i<gridRows; i++){
            let p1 = perspectiveTransform([0, layerYs[i]], M_inv);
            let p2 = perspectiveTransform([MAP_W, layerYs[i]], M_inv);
            if (getDist([x,y], p1, p2) < 15) {
                dragTarget = {type: 'h', i: i};
                dragStartFlat = perspectiveTransform([x, y], M_fwd);
                dragStartState = layerYs[i];
                return;
            }
        }
        // 纵线检测 (独立单段)
        for(let i=0; i<gridRows; i++){
            for(let j=1; j<gridCols; j++){
                let p1 = perspectiveTransform([layerColXs[i][j], layerYs[i]], M_inv);
                let p2 = perspectiveTransform([layerColXs[i][j], layerYs[i+1]], M_inv);
                if (getDist([x,y], p1, p2) < 15) {
                    dragTarget = {type: 'v', i: i, j: j};
                    dragStartFlat = perspectiveTransform([x, y], M_fwd);
                    dragStartState = layerColXs[i][j];
                    return;
                }
            }
        }
    }
    renderAnnotator();
};

annCvs.onmousemove = (e) => {
    if(!dragTarget) return;
    let rect = annCvs.getBoundingClientRect();
    let scaleX = annCvs.width / rect.width;
    let scaleY = annCvs.height / rect.height;
    let flatPt = perspectiveTransform([(e.clientX - rect.left)*scaleX, (e.clientY - rect.top)*scaleY], M_fwd);
    
    if (dragTarget.type === 'h') {
        let i = dragTarget.i;
        let dy = flatPt[1] - dragStartFlat[1];
        let newY = dragStartState + dy;
        let minY = layerYs[i-1] + 15;
        let maxY = layerYs[i+1] - 15;
        layerYs[i] = Math.max(minY, Math.min(maxY, newY));
    } else if (dragTarget.type === 'v') {
        let i = dragTarget.i, j = dragTarget.j;
        let dx = flatPt[0] - dragStartFlat[0];
        let newX = dragStartState + dx;
        let minX = layerColXs[i][j-1] + 10;
        let maxX = layerColXs[i][j+1] - 10;
        layerColXs[i][j] = Math.max(minX, Math.min(maxX, newX));
    }
    renderAnnotator();
};

annCvs.onmouseup = () => dragTarget = null;

function renderAnnotator() {
    annCtx.drawImage(bgImage, 0, 0);
    annCtx.lineWidth = 3; 
    
    if (shelfPoints.length > 0) {
        annCtx.strokeStyle = "#2ecc71"; 
        annCtx.beginPath();
        annCtx.moveTo(shelfPoints[0][0], shelfPoints[0][1]);
        for(let i=1; i<shelfPoints.length; i++) annCtx.lineTo(shelfPoints[i][0], shelfPoints[i][1]);
        if(shelfPoints.length===4) annCtx.closePath();
        annCtx.stroke();
        // 画出节点
        annCtx.fillStyle = "#e74c3c";
        for(let p of shelfPoints) {
            annCtx.beginPath(); annCtx.arc(p[0], p[1], 6, 0, Math.PI*2); annCtx.fill();
        }
    }
    
    if(M_inv) {
        annCtx.strokeStyle = "#f1c40f"; 
        // 画横线
        for(let i=1; i<gridRows; i++) {
            let p1 = perspectiveTransform([0, layerYs[i]], M_inv);
            let p2 = perspectiveTransform([MAP_W, layerYs[i]], M_inv);
            annCtx.beginPath(); annCtx.moveTo(p1[0], p1[1]); annCtx.lineTo(p2[0], p2[1]); annCtx.stroke();
        }
        // 画纵线
        for(let i=0; i<gridRows; i++) {
            for(let j=1; j<gridCols; j++) {
                let p1 = perspectiveTransform([layerColXs[i][j], layerYs[i]], M_inv);
                let p2 = perspectiveTransform([layerColXs[i][j], layerYs[i+1]], M_inv);
                annCtx.beginPath(); annCtx.moveTo(p1[0], p1[1]); annCtx.lineTo(p2[0], p2[1]); annCtx.stroke();
            }
        }
    }
}

// ========================================================
// 🚀 第二阶段：保存数据并切入三屏渲染
// ========================================================
let finalBoxes = [];
let annotationSaved = false;

function buildFinalBoxesFromGrid() {
    let boxId = 1;
    finalBoxes = []; // 每次保存前清空数组防止重复追加
    for(let i=0; i<gridRows; i++){
        for(let j=0; j<gridCols; j++){
            finalBoxes.push({
                box_id: boxId++, layer: i+1, column: j+1,
                video_polygon: [
                    perspectiveTransform([layerColXs[i][j], layerYs[i]], M_inv),
                    perspectiveTransform([layerColXs[i][j+1], layerYs[i]], M_inv),
                    perspectiveTransform([layerColXs[i][j+1], layerYs[i+1]], M_inv),
                    perspectiveTransform([layerColXs[i][j], layerYs[i+1]], M_inv)
                ]
            });
        }
    }
}

async function saveAnnotationOnly() {
    if(shelfPoints.length < 4) return alert("请先标注4个点生成网格！");
    
    setUIStatus("🟠 步骤 4：保存标注 JSON", "正在写入当前货架网格配置...", "#f39c12");
    buildFinalBoxesFromGrid();

    const resp = await fetch('/api/save_annotation', {
        method: 'POST', headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({shelf_corners: shelfPoints, grid_shape: [gridRows, gridCols], boxes: finalBoxes})
    });

    if (!resp.ok) {
        annotationSaved = false;
        setUIStatus("❌ 步骤 4 失败", "保存标注 JSON 失败，请检查后端日志后重试。", "#e74c3c");
        return;
    }

    annotationSaved = true;
    setUIStatus("✅ 步骤 4 完成", "标注 JSON 已保存。你现在可以手动替换 JSON，然后点击“3. 启动 AI 推理”。", "#2ecc71");
}

async function startInferenceOnly() {
    setUIStatus("🚀 步骤 5：正在加载 AI 模型...", "正在初始化 MMDetection 与 MMPose（仅首次耗时较长），即将进入三屏协同监控模式...", "#9b59b6");

    try {
        const annResp = await fetch('/api/get_current_annotation');
        if (annResp.ok) {
            const annData = await annResp.json();
            if (annData.status === 'success' && Array.isArray(annData.boxes) && annData.boxes.length > 0) {
                // 启动推理前强制以“后端当前 JSON 文件”为准，避免沿用页面内旧缓存。
                finalBoxes = annData.boxes;
                annotationSaved = true;
            }
        }
    } catch (e) {
        console.warn('无法刷新后端当前标注，继续使用当前页面缓存。', e);
    }
    
    const resp = await fetch('/api/start_inference', {method: 'POST'});
    if (!resp.ok) {
        setUIStatus("❌ 步骤 5 失败", "启动推理失败，请确认视频与 JSON 文件已准备好。", "#e74c3c");
        return;
    }

    if (!annotationSaved) {
        // 允许直接启动，便于测试手动替换后的 JSON。
        console.info("Inference started without current-page save. Testing external JSON is allowed.");
    }
    
    annCvs.style.display = "none";
    document.getElementById('views-container').style.display = "flex";
    
    setUIStatus("🚨 步骤 5：AI 实况监控中", "系统正在全速运行！【左上】原视频叠加碰撞框，【左下】剔除背景骨骼追踪，【右侧】2D 阵列碰撞高亮指示。", "#e74c3c");
    
    startRenderEngine();
}

// ========================================================
// 🎨 第三阶段：超高性能 Canvas 三屏渲染引擎 & HUD 面板
// ========================================================
const COCO_LINES = [[15,13],[13,11],[16,14],[14,12],[11,12],[5,11],[6,12],[5,6],[5,7],[6,8],[7,9],[8,10],[1,2],[0,1],[0,2],[1,3],[2,4],[3,5],[4,6]];
let currentInferenceWs = null;

function resetAnnotationSession() {
    // 清空上一段视频遗留的标注状态，确保重新上传可从 4 点重新标注。
    shelfPoints = [];
    M_fwd = null;
    M_inv = null;
    layerYs = [];
    layerColXs = [];
    dragTarget = null;
    dragStartFlat = null;
    dragStartState = null;
    finalBoxes = [];
    annotationSaved = false;

    if (currentInferenceWs) {
        currentInferenceWs.close();
        currentInferenceWs = null;
    }
}

function startRenderEngine() {
    const ctxRaw = document.getElementById('cvsRaw').getContext('2d');
    const ctxSkel = document.getElementById('cvsSkel').getContext('2d');
    const ctxGrid = document.getElementById('cvsGrid').getContext('2d');
    
    // 显示 HUD 仪表盘
    document.getElementById('hudPanel').style.display = "flex";
    
    if (currentInferenceWs) {
        currentInferenceWs.close();
    }

    let ws = new WebSocket(`ws://${window.location.host}/ws/inference`);
    currentInferenceWs = ws;
    let streamImg = new Image();
    let hasReceivedFrame = false;
    
    ws.onmessage = (event) => {
        hasReceivedFrame = true;
        let data = JSON.parse(event.data);
        streamImg.src = "data:image/jpeg;base64," + data.image;
        const collisionSet = new Set(data.collisions || []);
        const alarmSet = new Set(data.alarm_collisions || []);
        
        // 实时更新 HUD 仪表盘数据
        document.getElementById('hudTime').innerText = data.stats.video_time;
        document.getElementById('hudFrame').innerText = data.stats.frame_idx;
        document.getElementById('hudHit').innerText = collisionSet.size;
        document.getElementById('hudAlarm').innerText = alarmSet.size;
        
        let fpsEl = document.getElementById('hudFps');
        fpsEl.innerText = data.stats.fps;
        if(data.stats.fps < 15) fpsEl.className = "hud-value hud-danger";
        else fpsEl.className = "hud-value";
        
        streamImg.onload = () => {
            // 坐标缩放换算
            let coordScale = 640 / data.orig_width; 
            
            // 擦黑板
            ctxRaw.fillStyle = "#000000"; ctxRaw.fillRect(0, 0, 640, 360);
            ctxSkel.fillStyle = "#0d0d0d"; ctxSkel.fillRect(0, 0, 640, 360);
            
            // --- View 1: 渲染缩放好的原图，并叠加标注碰撞框 ---
            ctxRaw.drawImage(streamImg, 0, 0, 640, streamImg.height);
            ctxRaw.lineWidth = 2;

            finalBoxes.forEach(box => {
                const boxKey = "Box_" + box.box_id;
                const isRawHit = collisionSet.has(boxKey);
                const isAlarmHit = alarmSet.has(boxKey);
                // 红色=满足帧门槛报警；黄色=实时碰撞但未报警；绿色=无碰撞
                ctxRaw.strokeStyle = isAlarmHit ? "#ff0000" : (isRawHit ? "#ffd166" : "rgba(0,255,0,0.25)");

                ctxRaw.beginPath();
                ctxRaw.moveTo(box.video_polygon[0][0]*coordScale, box.video_polygon[0][1]*coordScale);
                for(let i=1; i<4; i++) ctxRaw.lineTo(box.video_polygon[i][0]*coordScale, box.video_polygon[i][1]*coordScale);
                ctxRaw.closePath();
                ctxRaw.stroke();
            });
            
            ctxSkel.lineWidth = 2;

            // --- View 2: 绘制物理多边形（仅在左下的黑底骨架图中绘制） ---
            finalBoxes.forEach(box => {
                const boxKey = "Box_" + box.box_id;
                const isRawHit = collisionSet.has(boxKey);
                const isAlarmHit = alarmSet.has(boxKey);
                // 红色=满足帧门槛报警；黄色=实时碰撞但未报警；绿色=无碰撞
                ctxSkel.strokeStyle = isAlarmHit ? "#ff0000" : (isRawHit ? "#ffd166" : "rgba(0,255,0,0.2)"); 
                
                ctxSkel.beginPath();
                ctxSkel.moveTo(box.video_polygon[0][0]*coordScale, box.video_polygon[0][1]*coordScale);
                for(let i=1; i<4; i++) ctxSkel.lineTo(box.video_polygon[i][0]*coordScale, box.video_polygon[i][1]*coordScale);
                ctxSkel.closePath();
                ctxSkel.stroke();
            });
            
            // --- View 2: 绘制骨架（仅在左下的黑底骨架图中绘制） ---
            data.skeletons.forEach(person => {
                let pts = person.keypoints;
                COCO_LINES.forEach(line => {
                    let p1 = pts[line[0]], p2 = pts[line[1]];
                    if (p1[2] > 0.3 && p2[2] > 0.3) {
                        ctxSkel.strokeStyle = "#00e5ff"; 
                        ctxSkel.beginPath();
                        ctxSkel.moveTo(p1[0]*coordScale, p1[1]*coordScale);
                        ctxSkel.lineTo(p2[0]*coordScale, p2[1]*coordScale);
                        ctxSkel.stroke();
                    }
                });
            });

            // --- View 3: 渲染 2D 阵列 (保持不变) ---
            ctxGrid.fillStyle = "#1e1e1e";
            ctxGrid.fillRect(0, 0, 500, 735);
            let cw = 500/gridCols, ch = 735/gridRows;
            
            finalBoxes.forEach(box => {
                let x = (box.column-1)*cw, y = (box.layer-1)*ch;
                const boxKey = "Box_" + box.box_id;
                const isRawHit = collisionSet.has(boxKey);
                const isAlarmHit = alarmSet.has(boxKey);
                ctxGrid.fillStyle = isAlarmHit ? "#ff4757" : (isRawHit ? "#f39c12" : "#3742fa");
                ctxGrid.fillRect(x+2, y+2, cw-4, ch-4);
                
                ctxGrid.strokeStyle = isAlarmHit ? "#ff6b81" : (isRawHit ? "#f5b041" : "#5352ed");
                ctxGrid.lineWidth = 2;
                ctxGrid.strokeRect(x+2, y+2, cw-4, ch-4);
                
                ctxGrid.fillStyle = "white";
                ctxGrid.font = "bold 18px Arial";
                ctxGrid.fillText("B" + box.box_id, x + cw/2 - 15, y + ch/2 + 6);
            });
        };
    };

    ws.onclose = () => {
        document.getElementById('hudPanel').style.display = "none";
        if (hasReceivedFrame) {
            setUIStatus(
                "✅ 推理结束",
                "视频已播放完成，后端已停止推理并关闭连接。可重新上传视频继续分析。",
                "#2ecc71"
            );
        } else {
            setUIStatus(
                "⚠️ 推理未启动",
                "推理连接已关闭，可能尚未完成标注或后端提前结束。",
                "#f39c12"
            );
        }
        if (currentInferenceWs === ws) {
            currentInferenceWs = null;
        }
    };

    ws.onerror = () => {
        setUIStatus(
            "❌ 推理连接异常",
            "与后端推理通道通信失败，请检查后端日志后重试。",
            "#e74c3c"
        );
    };
}
</script>
</body>
</html>
